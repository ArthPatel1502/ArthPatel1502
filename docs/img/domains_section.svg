<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#8E2DE2"/>
      <stop offset="100%" stop-color="#8E2DE2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#36BCF7"/>
      <stop offset="100%" stop-color="#36BCF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="420" fill="#0d1117"/>

  <!-- PROJECTS orb card -->
  <rect x="40" y="20" width="560" height="380" rx="8" fill="#0b0e17" stroke="#293040" stroke-width="1.2"/>
  <circle cx="320" cy="170" r="90" fill="url(#orb)">
    <animate attributeName="r" values="80;96;80" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <g font-family="Consolas, 'Courier New', monospace" text-anchor="middle" fill="#f0f6fc">
    <text x="320" y="300" font-size="30" font-weight="700" letter-spacing="4">PROJECTS</text>
    <text x="320" y="328" font-size="13" fill="#7d8590" letter-spacing="1.5">systems &#8226; experiments &#8226; builds</text>
    <text x="320" y="365" font-size="14" fill="#36BCF7" letter-spacing="3">ENTER &#8594;</text>
  </g>

  <!-- FOCUS GRAPH card -->
  <rect x="620" y="20" width="540" height="380" rx="8" fill="#0b0e17" stroke="#293040" stroke-width="1.2"/>
  <text x="890" y="55" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="15" letter-spacing="4" fill="#e6edf3">FOCUS GRAPH</text>

  <g stroke="#2a3550" stroke-width="1.2">
    <line x1="890" y1="230" x2="760" y2="140"/>
    <line x1="890" y1="230" x2="1010" y2="130"/>
    <line x1="890" y1="230" x2="740" y2="300"/>
    <line x1="890" y1="230" x2="1000" y2="320"/>
    <line x1="890" y1="230" x2="890" y2="350"/>
  </g>

  <circle cx="890" cy="230" r="34" fill="url(#node)">
    <animate attributeName="r" values="30;38;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="890" y="235" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#0d1117">CORE</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#c9d1d9">
    <circle cx="760" cy="140" r="6" fill="#36BCF7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
    <text x="705" y="122" text-anchor="middle">DevOps</text>

    <circle cx="1010" cy="130" r="6" fill="#8E2DE2"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <text x="1035" y="112" text-anchor="middle">AI / ML</text>

    <circle cx="740" cy="300" r="6" fill="#36BCF7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/></circle>
    <text x="700" y="325" text-anchor="middle">Web Dev</text>

    <circle cx="1000" cy="320" r="6" fill="#8E2DE2"><animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <text x="1040" y="342" text-anchor="middle">Data</text>

    <circle cx="890" cy="350" r="6" fill="#36BCF7"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <text x="890" y="375" text-anchor="middle">Automation</text>
  </g>
</svg>
