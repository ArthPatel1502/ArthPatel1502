<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="collabOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#36BCF7"/>
      <stop offset="100%" stop-color="#8E2DE2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="#0d1117"/>
  <rect x="40" y="20" width="1120" height="300" rx="8" fill="#0b0e17" stroke="#293040" stroke-width="1.2"/>

  <circle cx="230" cy="170" r="70" fill="url(#collabOrb)">
    <animate attributeName="r" values="60;76;60" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <g font-family="Consolas, 'Courier New', monospace" text-anchor="middle" fill="#f0f6fc">
    <text x="230" y="270" font-size="22" font-weight="700" letter-spacing="3">COLLABORATION</text>
    <text x="230" y="293" font-size="12" fill="#7d8590">open to &#8226; learning &#8226; building together</text>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" fill="#c9d1d9" font-size="14">
    <text x="470" y="95" font-size="16" font-weight="700" fill="#e6edf3">I'm open to collaborating on:</text>
    <circle cx="477" cy="128" r="3" fill="#36BCF7"/><text x="492" y="133">DevOps automation projects</text>
    <circle cx="477" cy="160" r="3" fill="#8E2DE2"/><text x="492" y="165">AI-powered full-stack apps</text>
    <circle cx="477" cy="192" r="3" fill="#36BCF7"/><text x="492" y="197">Open-source contributions</text>
    <circle cx="477" cy="224" r="3" fill="#8E2DE2"/><text x="492" y="229">Study / build partnerships</text>
  </g>

  <text x="1080" y="285" text-anchor="middle" font-family="Consolas, monospace" font-size="14" letter-spacing="2" fill="#36BCF7">CONNECT &#8594;</text>
</svg>
