<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36BCF7"/>
      <stop offset="100%" stop-color="#8E2DE2"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="896" height="436" rx="14" fill="#0d1117" stroke="url(#frame)" stroke-width="2"/>

  <!-- title bar -->
  <rect x="2" y="2" width="896" height="38" rx="14" fill="#161b26"/>
  <rect x="2" y="26" width="896" height="14" fill="#161b26"/>
  <circle cx="30" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="21" r="6" fill="#27c93f"/>
  <text x="450" y="26" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#7d8590">arth@devops — stack.sh</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="17" fill="#c9d1d9">

    <text x="28" y="80" fill="#36BCF7" opacity="0">$ whoami
      <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="105" opacity="0">&gt; arth_patel — devops + ai engineer
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
    </text>

    <text x="28" y="150" fill="#36BCF7" opacity="0">$ cat stack.yml
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
    </text>

    <text x="28" y="180" opacity="0"><tspan fill="#8E2DE2">devops:</tspan> docker, kubernetes, git, github-actions, linux, aws
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="207" opacity="0"><tspan fill="#8E2DE2">languages:</tspan> python, c, cpp, java, javascript
      <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="234" opacity="0"><tspan fill="#8E2DE2">frameworks:</tspan> react, node.js
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="261" opacity="0"><tspan fill="#8E2DE2">data:</tspan> pandas, mysql, mongodb
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="288" opacity="0"><tspan fill="#8E2DE2">design:</tspan> figma, photoshop, illustrator
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
    </text>

    <text x="28" y="333" fill="#36BCF7" opacity="0">$ status --current
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="28" y="360" opacity="0">&gt; learning CI/CD pipelines + cloud-native workflows...
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.3s" fill="freeze"/>
    </text>

    <text x="28" y="405" fill="#36BCF7" opacity="0">$ _
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.3s" fill="freeze"/>
    </text>
    <rect x="60" y="391" width="12" height="18" fill="#36BCF7" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.001;0.5;0.51;1" begin="4.8s" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
